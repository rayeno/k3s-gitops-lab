apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: ghcr.io/rayeno/flask-app:latest
        ports:
        - containerPort: 5000
        env:
        - name: APP_ENV
          value: dev
        - name: APP_VERSION
          value: latest
        - name: APP_MESSAGE
          value: Hello from the GitOps demo app!